<html>
    <head>
        <p id="a">hello sir kem cho</p>
        <script>
           function fun()
           {
            document.getElementById('a').style.textTransform="uppercase"
           }
           function fun2()
           {
            document.getElementById('a').style.textTransform="lowercase"
           }
        </script>
    </head>
    <body>
        <input type="button" onclick="fun()" value="Upper">
        <input type="button" onclick="fun2()" value="Lower">

    </body>
</html>
