<!-- write a function that return thr promise which resloe number after a sec 
use a loop with async to get 1,2,3 print the double result for each value -->
<html>
    <body>
        <script>
            function pn(num)
            {
                return new Promise((resolve)=>{
                    setTimeout(()=>{
                        resolve(num*3)
                    },1000)
                })
            }
            async function gn()
            {
                for(let i=1;i<=3;i++)
                {
                    let input=prompt("enter"+i)
                    let number=Number(input)
                    let  result=await pn(number)
                    console.log("triple",result)
                }
            }
              gn()
        </script>
    </body>
</html>
