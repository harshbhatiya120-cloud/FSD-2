<!-- bg color should turn red while key is down
and turn bule when key is up -->
<html>
    <head>

        <script>
              function fun(id)
              {
                id.bgColor="blue "
              }
              function fun1(id)
              {
                id.bgColor="red"
              }
        </script>
    </head>
    <body onkeyup="fun(this)" onkeydown="fun1(this)">
        
    </body>
</html>
